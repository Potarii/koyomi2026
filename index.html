<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>暦カレンダー 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500;700&family=Kaisei+Opti:wght@400;700&display=swap');
:root{--gold:#c9a84c;--gold-l:#e8c97a;--deep:#1a1008;--warm:#2d1f0e;--paper:#faf3e0;--ink:#2c1810;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--deep);min-height:100vh;font-family:'Noto Serif JP',serif;color:var(--ink);
  background-image:radial-gradient(ellipse at 20% 20%,rgba(201,168,76,.08) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 80%,rgba(201,168,76,.05) 0%,transparent 50%);}

/* ─── ヘッダー ─── */
header{background:linear-gradient(135deg,#1a1008,#2d1f0e 50%,#1a1008);border-bottom:2px solid var(--gold);
  padding:12px 14px 8px;text-align:center;position:sticky;top:0;z-index:100;}
header h1{font-family:'Kaisei Opti',serif;color:var(--gold-l);font-size:1.3rem;letter-spacing:.25em;text-shadow:0 0 20px rgba(201,168,76,.4);}
header p{color:rgba(232,201,122,.5);font-size:.58rem;letter-spacing:.14em;margin-top:2px;}

.wrap{max-width:900px;margin:0 auto;padding:12px 10px;}

/* ─── フィルター ─── */
.filter-box{background:rgba(42,28,14,.92);border:1px solid rgba(201,168,76,.28);border-radius:12px;padding:10px 12px;margin-bottom:12px;}
.filter-hdr{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px;}
.filter-title{color:var(--gold-l);font-size:.67rem;letter-spacing:.15em;}
.btn-clear{font-size:.58rem;padding:2px 9px;border-radius:10px;background:rgba(255,255,255,.07);border:1px solid rgba(201,168,76,.35);color:rgba(232,201,122,.75);cursor:pointer;font-family:'Noto Serif JP',serif;transition:all .18s;white-space:nowrap;}
.btn-clear:hover{background:rgba(201,168,76,.2);color:var(--gold-l);}
.filter-grid{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;}
.fbtn{display:flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;border:1px solid transparent;cursor:pointer;font-family:'Noto Serif JP',serif;font-size:.64rem;transition:all .18s;background:rgba(255,255,255,.05);color:rgba(255,255,255,.45);}
.fbtn.on{background:rgba(201,168,76,.15);border-color:var(--gold);color:var(--gold-l);}
.fbtn .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

/* ─── 月ナビ ─── */
.mnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.mnav button{background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.4);color:var(--gold-l);width:32px;height:32px;border-radius:50%;font-size:.9rem;cursor:pointer;transition:background .2s;}
.mnav button:hover{background:rgba(201,168,76,.3);}
.mnav h2{color:var(--gold-l);font-family:'Kaisei Opti',serif;font-size:1.1rem;letter-spacing:.15em;text-shadow:0 0 10px rgba(201,168,76,.3);}
.mnav-center{display:flex;align-items:center;gap:8px;}
.btn-today{font-family:'Noto Serif JP',serif;font-size:.6rem;padding:4px 10px;border-radius:12px !important;width:auto !important;height:auto !important;background:rgba(201,168,76,.25) !important;border:1px solid rgba(201,168,76,.6) !important;color:var(--gold-l) !important;letter-spacing:.08em;white-space:nowrap;}

/* ─── カレンダー ─── */
.cal-wrap{background:rgba(250,243,224,.97);border-radius:14px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.5),0 0 0 1px rgba(201,168,76,.3);}
.wk-hdr{display:grid;grid-template-columns:repeat(7,1fr);background:linear-gradient(135deg,#2d1f0e,#1a1008);border-bottom:1px solid rgba(201,168,76,.3);}
.wk-hdr div{text-align:center;padding:7px 2px;font-size:.67rem;color:rgba(232,201,122,.8);}
.wk-hdr div:first-child{color:#e74c3c;}
.wk-hdr div:last-child{color:#6699cc;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:rgba(201,168,76,.15);}

.dc{background:var(--paper);min-height:112px;padding:5px 4px 4px;cursor:pointer;transition:background .12s;position:relative;overflow:hidden;}
.dc:hover{background:#fff8e7;z-index:1;box-shadow:0 2px 12px rgba(0,0,0,.15);}
.dc.emp{background:rgba(240,227,192,.3);cursor:default;}
.dc.tod{background:#fffbe8;box-shadow:inset 0 0 0 2px var(--gold);}
/* 満月・新月の日のセル背景 */
.dc.fullmoon{background:#f0f8ff;}
.dc.newmoon{background:#f5f0ff;}

.dn-row{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:2px;}
.dn{font-family:'Kaisei Opti',serif;font-size:1.05rem;font-weight:700;line-height:1;color:var(--ink);}
.dc.sun .dn,.dc.hol .dn{color:#c0392b;}
.dc.sat .dn{color:#2c5f8a;}

/* 六曜バッジ */
.ry{font-size:.46rem;padding:1px 3px;border-radius:3px;font-weight:600;letter-spacing:.03em;line-height:1.4;}
.r0{background:#fff0f0;color:#c0392b;border:1px solid #e74c3c;}
.r1{background:#ede7f6;color:#6c3483;border:1px solid #8e44ad;}
.r2{background:#fff5e6;color:#d35400;border:1px solid #e67e22;}
.r3{background:#e8f8e8;color:#1e8449;border:1px solid #27ae60;}
.r4{background:#e8f0ff;color:#2471a3;border:1px solid #2980b9;}
.r5{background:#f0f8f0;color:#117a65;border:1px solid #1abc9c;}

.kl{font-size:.43rem;color:#9e7c55;margin-bottom:1px;line-height:1.3;}

/* 月齢・節気行 */
.moon-row{font-size:.55rem;font-weight:700;letter-spacing:.04em;margin-bottom:1px;line-height:1.3;}
.moon-full{color:#1565c0;}   /* 🌝満月 */
.moon-new{color:#4a148c;}    /* 🌚新月 */
.moon-row-big{display:flex;align-items:center;gap:2px;margin-bottom:2px;line-height:1.2;}
.moon-row-big .moon-emoji{font-size:1.45rem;line-height:1;}
.moon-row-big .moon-txt{font-size:.58rem;font-weight:700;letter-spacing:.04em;}
.moon-row-big.moon-full .moon-txt{color:#1565c0;}
.moon-row-big.moon-new  .moon-txt{color:#4a148c;}
.setki-badge{font-size:.42rem;padding:1px 4px;border-radius:3px;background:rgba(45,100,45,.1);color:#2d6a4f;border:1px solid rgba(45,100,45,.25);letter-spacing:.03em;display:inline-block;}

/* ─── 土用バナー ─── */
.doyou-bar{
  position:absolute;top:0;left:0;right:0;
  height:5px;background:linear-gradient(90deg,#e65100,#ffa000);
  z-index:2;
}
.doyou-bar.start{border-radius:0;left:0;}
.doyou-bar.end{border-radius:0;right:0;}
.doyou-label{
  font-size:.38rem;font-weight:700;color:#e65100;
  letter-spacing:.04em;line-height:1;margin-bottom:1px;
  padding-top:6px; /* バナー分の余白 */
}

/* ─── 惑星逆行バナー ─── */
.retro-bar{
  position:absolute;top:0;left:0;right:0;
  height:5px;z-index:3;
}
/* 惑星ごとの色 */
.rb-mercury{background:linear-gradient(90deg,#00b4d8,#48cae4,#90e0ef);height:9px !important;box-shadow:0 0 6px rgba(0,180,216,.6);}
.rb-venus  {background:linear-gradient(90deg,#c97b5a,#f0c06a);}
.rb-mars   {background:linear-gradient(90deg,#c0392b,#e74c3c);}
.rb-jupiter{background:linear-gradient(90deg,#8e44ad,#bb8fce);}
.rb-saturn {background:linear-gradient(90deg,#2e86c1,#5dade2);}
.rb-uranus {background:linear-gradient(90deg,#1e8449,#58d68d);}
.rb-neptune{background:linear-gradient(90deg,#1a5276,#2e86c1);}
.rb-pluto  {background:linear-gradient(90deg,#4a235a,#7d3c98);}

/* 複数惑星が重なるときはバナーを積み重ねる */
/* 水星は9px、他は5px を考慮してJS側でtopを動的設定 */
.retro-bar.layer2{top:9px;}
.retro-bar.layer3{top:14px;}
.retro-bar.layer4{top:19px;}

.retro-label{
  font-size:.38rem;font-weight:700;letter-spacing:.03em;line-height:1;
  margin-bottom:1px;
}

/* 惑星逆行解説パネル */
.retro-panel{
  background:rgba(20,10,40,.96);
  border:1px solid rgba(100,50,200,.4);
  border-radius:12px;
  padding:12px;
  margin-top:12px;
}
.retro-panel-title{
  color:#bb8fce;
  font-size:.7rem;
  letter-spacing:.15em;
  text-align:center;
  margin-bottom:10px;
  font-family:'Kaisei Opti',serif;
}
.retro-planet-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
}
.retro-planet-card{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(150,100,220,.25);
  border-radius:8px;
  padding:7px 9px;
}
.retro-planet-hdr{
  display:flex;align-items:center;gap:5px;margin-bottom:4px;
}
.retro-planet-dot{
  width:8px;height:8px;border-radius:50%;flex-shrink:0;
}
.retro-planet-name{
  font-size:.68rem;font-weight:700;letter-spacing:.06em;
}
.retro-planet-theme{
  font-size:.56rem;color:rgba(200,170,255,.7);margin-bottom:4px;
  line-height:1.35;
}
.retro-planet-period{
  font-size:.56rem;color:rgba(200,200,255,.55);
  border-top:1px dashed rgba(150,100,220,.2);
  padding-top:4px;
  line-height:1.5;
}

/* モーダル内の惑星逆行ブロック */
.retro-modal-block{
  background:rgba(20,10,40,.06);
  border:1px solid rgba(100,50,200,.2);
  border-radius:10px;
  padding:10px 12px;
  margin-bottom:10px;
}
.retro-modal-block h5{
  font-size:.65rem;color:#6c3483;letter-spacing:.1em;
  margin-bottom:7px;border-bottom:1px solid rgba(100,50,200,.15);
  padding-bottom:4px;
}
.retro-modal-item{
  display:flex;align-items:flex-start;gap:7px;
  font-size:.68rem;margin-bottom:5px;
}
.retro-modal-dot{
  width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:3px;
}
.retro-modal-txt strong{color:#4a235a;display:block;margin-bottom:1px;font-size:.7rem;}
.retro-modal-txt span{color:#5d4037;line-height:1.4;}

/* ─── アイコン ─── */
.icons{display:flex;flex-wrap:wrap;gap:2px;margin-top:2px;align-items:center;}
.ki{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:4px;font-size:.78rem;font-weight:900;cursor:help;position:relative;flex-shrink:0;border:1.5px solid;background:#fff;font-family:'Noto Serif JP',serif;}
.ki-xl{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:6px;font-size:1.05rem;font-weight:900;cursor:help;position:relative;flex-shrink:0;border:2px solid;background:#fff;}
/* 最良日・最悪日ハイライト */
.dc.best-day{box-shadow:inset 0 0 0 3px #f4c430,inset 0 0 0 1px #f4c430;background:#fffde7;}
.dc.worst-day{box-shadow:inset 0 0 0 3px #9e9e9e,inset 0 0 0 1px #9e9e9e;background:#f5f5f5;}
.dc.best-day .dn{color:#e65100;}
.dc.worst-day .dn{color:#757575;}

/* カラー */
.c-tg{color:#1b5e20;border-color:#43a047;} .c-tb{color:#b71c1c;border-color:#e53935;}
.c-cg{color:#0d47a1;border-color:#1e88e5;} .c-cb{color:#880e4f;border-color:#c2185b;}
.c-gg{color:#33691e;border-color:#7cb342;} .c-gb{color:#e65100;border-color:#ffa000;}
.c-mb{color:#7b1fa2;border-color:#ab47bc;} .c-bl{color:#6a1b9a;border-color:#8e24aa;}
.c-sg{color:#00695c;border-color:#00acc1;} .c-lg{color:#1a237e;border-color:#3949ab;}
.c-ca{color:#bf360c;border-color:#ff6d00;}
/* 事業開始吉日 */
.c-st-s {color:#1a1008;border-color:transparent;background:#ffe082;}   /* 吉 */
.c-st-a {color:#1a1008;border-color:transparent;background:#ffca28;}   /* 大吉 */
.c-st-ex{color:#7a4000;border-color:#c8860a;background:linear-gradient(135deg,#ffe259,#ffa751);
  box-shadow:0 0 8px rgba(255,180,0,.9),0 0 2px rgba(255,140,0,.6);
  animation:goldglow 2s ease-in-out infinite alternate;
  font-weight:900;text-shadow:0 1px 2px rgba(255,255,255,.6);}
@keyframes goldglow{
  from{box-shadow:0 0 6px rgba(255,180,0,.8),0 0 2px rgba(255,140,0,.5);}
  to  {box-shadow:0 0 18px rgba(255,200,0,1),0 0 8px rgba(255,160,0,.7),0 0 32px rgba(255,200,0,.3);}
}
/* 最吉日のセルハイライト */
.dc.startup-ex{
  background:linear-gradient(160deg,#fffde7 60%,#fff8c0) !important;
  box-shadow:inset 0 0 0 2.5px #c8860a,0 0 10px rgba(200,134,10,.25) !important;
}
.dc.startup-ex .dn{color:#7a4000 !important;}
.c-ki{color:#1a1008;border-color:transparent;background:#fff9c4;}
.c-to{color:#1a1008;border-color:transparent;background:#fff59d;}
.c-money{color:#1a1008;border-color:transparent;background:#fff176;}

/* 自然農法カラー：薄グリーン塗りつぶし・黒文字・枠なし */
.c-nm-sg  {color:#1a2e1a;border-color:transparent;background:#c8e6c9;}  /* 種まき◎ */
.c-nm-sb  {color:#b71c1c;border-color:#c62828;}                          /* 種まき✕ */
.c-nm-fg  {color:#1a2e1a;border-color:transparent;background:#dcedc8;}  /* 収穫◎ */
.c-nm-fb  {color:#6d4c41;border-color:#8d6e63;}                          /* 収穫△ */
.c-nm-wg  {color:#1a2e1a;border-color:transparent;background:#b2dfdb;}  /* 水やり◎ */
.c-nm-wb  {color:#0277bd;border-color:#0288d1;}                          /* 水やり注意 */
.c-nm-gg  {color:#1a2e1a;border-color:transparent;background:#ccff90;}  /* 草刈り◎ */
.c-nm-rest{color:#1a2e1a;border-color:transparent;background:#dcedc8;}  /* 畑休息 */

/* 特大3種 */
.c-ts{color:#e65100;border-color:#ffc107;background:#fff;animation:glow 1.8s ease-in-out infinite alternate;}
@keyframes glow{from{box-shadow:0 0 5px rgba(255,193,7,.7);}to{box-shadow:0 0 16px rgba(255,193,7,1),0 0 28px rgba(255,193,7,.35);}}
.c-js{color:#111;border-color:transparent;background:transparent;box-shadow:none;}
.c-fs{color:#c62828;border-color:transparent;background:transparent;box-shadow:none;}

/* tooltip */
.ki:hover::after,.ki-xl:hover::after{
  content:attr(data-tip);position:absolute;bottom:calc(100% + 5px);left:50%;
  transform:translateX(-50%);background:rgba(16,8,2,.97);color:#faf3e0;
  font-size:.6rem;padding:6px 9px;border-radius:7px;white-space:pre-wrap;z-index:9999;
  border:1px solid rgba(201,168,76,.5);font-family:'Noto Serif JP',serif;
  min-width:120px;max-width:180px;text-align:center;pointer-events:none;line-height:1.55;}

/* ─── 予定 ─── */
.ev-list{margin-top:3px;display:flex;flex-direction:column;gap:1px;}
.ev-chip{font-size:.44rem;line-height:1.3;padding:1px 3px;border-radius:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;max-width:100%;font-family:'Noto Serif JP',serif;}
.ev-more{font-size:.42rem;color:#8d6e4f;padding-left:2px;}

/* ─── 凡例 ─── */
.leg{background:rgba(42,28,14,.9);border:1px solid rgba(201,168,76,.25);border-radius:12px;padding:12px;margin-top:12px;}
.leg-title{color:var(--gold-l);font-size:.67rem;letter-spacing:.15em;text-align:center;margin-bottom:10px;}
.leg-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.leg-sep{grid-column:1/-1;border-top:1px dashed rgba(201,168,76,.2);padding-top:5px;margin-top:2px;color:rgba(232,201,122,.55);font-size:.58rem;letter-spacing:.1em;}
.leg-item{display:flex;align-items:center;gap:6px;color:rgba(232,201,122,.82);font-size:.6rem;}
/* 起業吉日 日付一覧ブロック */
.startup-dates-block{
  grid-column:1/-1;
  background:rgba(255,220,50,.06);
  border:1px solid rgba(200,134,10,.2);
  border-radius:8px;
  padding:7px 10px;
  margin-top:2px;
}
.startup-dates-title{
  font-size:.58rem;font-weight:700;letter-spacing:.08em;margin-bottom:5px;
}
.startup-dates-list{
  display:flex;flex-wrap:wrap;gap:3px;
}
.startup-date-chip{
  font-size:.54rem;padding:2px 5px;border-radius:4px;
  font-family:'Noto Serif JP',serif;white-space:nowrap;cursor:default;
}
.sd-ex{background:linear-gradient(135deg,#ffe259,#ffa751);color:#7a4000;font-weight:700;
  box-shadow:0 0 5px rgba(255,180,0,.6);}
.sd-a {background:#ffca28;color:#1a1008;}
.sd-s {background:#ffe082;color:#1a1008;}
.li{width:20px;height:20px;border-radius:4px;flex-shrink:0;background:#fff;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:900;border:1.5px solid transparent;}
.li.xl{width:26px;height:26px;border-width:2px;border-radius:6px;font-size:1rem;}
.li.moon{border-radius:50%;font-size:.95rem;}

/* ─── 新月スピリチュアルブロック ─── */
.newmoon-block{
  background:linear-gradient(135deg,rgba(74,20,140,.07) 0%,rgba(100,50,180,.04) 100%);
  border:1px solid rgba(100,50,200,.25);
  border-radius:12px;
  padding:12px 14px;
  margin-bottom:10px;
}
.newmoon-block-title{
  display:flex;align-items:center;gap:7px;
  font-size:.72rem;font-weight:700;letter-spacing:.12em;color:#4a148c;
  border-bottom:1px solid rgba(100,50,200,.18);
  padding-bottom:6px;margin-bottom:10px;
  font-family:'Kaisei Opti',serif;
}
.nm-section{margin-bottom:10px;}
.nm-section:last-child{margin-bottom:0;}
.nm-section-title{
  font-size:.63rem;font-weight:700;color:#6a1b9a;
  letter-spacing:.08em;margin-bottom:5px;
  display:flex;align-items:center;gap:4px;
}
.nm-section-title::before{
  content:'';display:inline-block;width:3px;height:10px;
  background:linear-gradient(180deg,#9c27b0,#4a148c);border-radius:2px;
}
.nm-rows{display:flex;flex-direction:column;gap:5px;}
.nm-row{
  display:flex;align-items:flex-start;gap:8px;
  background:rgba(255,255,255,.55);border:1px solid rgba(150,80,220,.15);
  border-radius:8px;padding:7px 9px;font-size:.67rem;color:#3e2723;line-height:1.5;
}
.nm-row-icon{font-size:1rem;flex-shrink:0;width:22px;text-align:center;margin-top:1px;}
.nm-row-body strong{display:block;font-size:.68rem;color:#4a148c;margin-bottom:1px;}
.nm-wish-rules{display:flex;flex-direction:column;gap:4px;}
.nm-rule{
  display:flex;align-items:center;gap:6px;font-size:.65rem;color:#4a148c;
  background:rgba(156,39,176,.06);border-radius:6px;padding:5px 8px;
}
.nm-rule-dot{
  width:6px;height:6px;border-radius:50%;background:#9c27b0;flex-shrink:0;
}
.nm-avoid-grid{display:flex;flex-direction:column;gap:4px;}
.nm-avoid-item{
  display:flex;align-items:flex-start;gap:6px;font-size:.65rem;color:#6d1b7b;
  background:rgba(100,0,100,.05);border-radius:6px;padding:5px 8px;
  border-left:3px solid rgba(156,39,176,.3);
}
.nm-avoid-icon{font-size:.85rem;flex-shrink:0;}
.nm-timing-badge{
  display:inline-block;background:linear-gradient(135deg,#4a148c,#6a1b9a);
  color:#fff;font-size:.65rem;padding:4px 10px;border-radius:20px;
  letter-spacing:.08em;margin-bottom:8px;font-family:'Kaisei Opti',serif;
}
.nm-wish-count{
  font-size:.63rem;color:#6a1b9a;background:rgba(156,39,176,.08);
  border:1px dashed rgba(156,39,176,.3);border-radius:6px;
  padding:5px 9px;margin-top:6px;line-height:1.5;
}

/* ─── 満月ビューティ＆ヘルスブロック ─── */
.fullmoon-block{
  background:linear-gradient(135deg,rgba(21,101,192,.07) 0%,rgba(255,215,0,.06) 100%);
  border:1px solid rgba(21,101,192,.25);
  border-radius:12px;
  padding:12px 14px;
  margin-bottom:10px;
}
.fullmoon-block-title{
  display:flex;align-items:center;gap:7px;
  font-size:.72rem;font-weight:700;letter-spacing:.12em;color:#0d47a1;
  border-bottom:1px solid rgba(21,101,192,.18);
  padding-bottom:6px;margin-bottom:10px;
  font-family:'Kaisei Opti',serif;
}
.fm-section{margin-bottom:10px;}
.fm-section:last-child{margin-bottom:0;}
.fm-section-title{
  font-size:.63rem;font-weight:700;color:#1565c0;
  letter-spacing:.08em;margin-bottom:5px;
  display:flex;align-items:center;gap:4px;
}
.fm-section-title::before{
  content:'';display:inline-block;width:3px;height:10px;
  background:linear-gradient(180deg,#1e88e5,#0d47a1);border-radius:2px;
}
.fm-rows{display:flex;flex-direction:column;gap:5px;}
.fm-row{
  display:flex;align-items:flex-start;gap:8px;
  background:rgba(255,255,255,.6);border:1px solid rgba(21,101,192,.15);
  border-radius:8px;padding:7px 9px;font-size:.67rem;color:#1a2a3a;line-height:1.5;
}
.fm-row-icon{font-size:1rem;flex-shrink:0;width:22px;text-align:center;margin-top:1px;}
.fm-row-body strong{display:block;font-size:.68rem;color:#0d47a1;margin-bottom:1px;}
.fm-care-grid{display:flex;flex-direction:column;gap:4px;}
.fm-care-item{
  display:flex;align-items:flex-start;gap:6px;font-size:.65rem;
  background:rgba(21,101,192,.06);border-radius:6px;padding:5px 8px;
  border-left:3px solid rgba(21,101,192,.3);color:#1a2a4a;line-height:1.4;
}
.fm-care-icon{font-size:.85rem;flex-shrink:0;}
.fm-badge{
  display:inline-block;
  background:linear-gradient(135deg,#1565c0,#1e88e5);
  color:#fff;font-size:.65rem;padding:4px 10px;border-radius:20px;
  letter-spacing:.08em;margin-bottom:8px;font-family:'Kaisei Opti',serif;
}
.fm-alert{
  font-size:.63rem;color:#1565c0;background:rgba(21,101,192,.07);
  border:1px dashed rgba(21,101,192,.3);border-radius:6px;
  padding:5px 9px;margin-top:6px;line-height:1.5;
}
.fm-2col{
  display:grid;grid-template-columns:1fr 1fr;gap:5px;
}
.fm-2col-item{
  background:rgba(255,255,255,.6);border:1px solid rgba(21,101,192,.15);
  border-radius:8px;padding:7px 8px;font-size:.63rem;color:#1a2a3a;line-height:1.45;
  text-align:center;
}
.fm-2col-item .fm-2col-icon{font-size:1.2rem;display:block;margin-bottom:3px;}
.fm-2col-item strong{display:block;font-size:.65rem;color:#0d47a1;margin-bottom:2px;}

/* ─── モーダル ─── */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:200;align-items:flex-end;justify-content:center;}
.modal-ov.open{display:flex;}
.modal-sheet{background:var(--paper);border-radius:20px 20px 0 0;padding:18px;width:100%;max-width:600px;max-height:78vh;overflow-y:auto;border-top:3px solid var(--gold);}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.modal-date-txt{font-family:'Kaisei Opti',serif;font-size:1.15rem;color:var(--ink);}
.modal-close{background:var(--warm);color:var(--gold-l);border:none;width:28px;height:28px;border-radius:50%;font-size:.95rem;cursor:pointer;flex-shrink:0;}

/* 月齢・節気インフォ */
.moon-info-bar{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding:8px 10px;background:rgba(100,50,180,.07);border:1px solid rgba(100,50,180,.2);border-radius:9px;flex-wrap:wrap;}
.moon-info-emoji{font-size:1.4rem;line-height:1;}
.moon-info-text{font-size:.72rem;color:var(--ink);}
.moon-info-text strong{font-size:.78rem;}
.setki-info{font-size:.68rem;padding:3px 8px;border-radius:6px;background:rgba(45,100,45,.1);color:#2d6a4f;border:1px solid rgba(45,100,45,.3);}

.mkg{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;}
.mki{background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.2);border-radius:8px;padding:6px 9px;}
.mkl{font-size:.56rem;color:#8d6e4f;letter-spacing:.08em;margin-bottom:2px;}
.mkv{font-size:.8rem;font-weight:500;color:var(--ink);}

/* 自然農法アドバイスブロック */
.nature-block{background:rgba(45,100,45,.06);border:1px solid rgba(45,100,45,.2);border-radius:10px;padding:10px 12px;margin-bottom:10px;}
.nature-block h5{font-size:.65rem;color:#2d6a4f;letter-spacing:.1em;margin-bottom:7px;border-bottom:1px solid rgba(45,100,45,.15);padding-bottom:4px;}
.nature-advice{display:flex;flex-direction:column;gap:5px;}
.na-item{display:flex;gap:7px;align-items:flex-start;font-size:.68rem;}
.na-icon{font-size:.85rem;flex-shrink:0;width:20px;text-align:center;}
.na-text{color:#3e2723;line-height:1.45;}
.na-text strong{color:#1b5e20;display:block;margin-bottom:1px;font-size:.7rem;}

.luck-m{display:flex;gap:3px;margin-bottom:10px;padding:8px;background:rgba(201,168,76,.07);border-radius:8px;}
.lm-it{flex:1;text-align:center;}
.lm-lb{font-size:.52rem;color:#8d6e4f;margin-bottom:3px;}
.lm-st{font-size:.62rem;color:var(--gold);}
.mev h4{font-size:.7rem;color:#5d4037;letter-spacing:.08em;margin-bottom:7px;border-bottom:1px solid rgba(201,168,76,.3);padding-bottom:4px;}
.mev-item{display:flex;gap:7px;align-items:flex-start;padding:5px 0;border-bottom:1px dashed rgba(201,168,76,.2);font-size:.68rem;}
.mev-icon{width:26px;height:26px;border-radius:6px;flex-shrink:0;background:#fff;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:900;border:1.5px solid;}
.mev-icon.xl{width:32px;height:32px;font-size:1rem;border-width:2px;}
.mev-txt strong{display:block;color:var(--ink);margin-bottom:2px;font-size:.72rem;}
.mev-txt span{color:#5d4037;line-height:1.4;}

/* ─── 予定フォーム ─── */
.sched-section{border-top:1px solid rgba(201,168,76,.25);margin-top:10px;padding-top:10px;}
.sched-section h4{font-size:.7rem;color:#5d4037;margin-bottom:8px;letter-spacing:.08em;}
.sched-list{display:flex;flex-direction:column;gap:5px;margin-bottom:10px;}
.sched-chip{display:flex;align-items:center;gap:6px;padding:6px 9px;border-radius:8px;font-size:.72rem;border:1px solid transparent;}
.sched-del{margin-left:auto;background:none;border:none;color:rgba(150,100,80,.6);font-size:.8rem;cursor:pointer;padding:0 2px;flex-shrink:0;}
.sched-del:hover{color:#c0392b;}
.sched-form{display:flex;flex-direction:column;gap:7px;}
.sched-input{font-family:'Noto Serif JP',serif;font-size:.75rem;border:1px solid rgba(201,168,76,.4);border-radius:8px;padding:7px 10px;background:rgba(255,250,235,.8);color:var(--ink);outline:none;width:100%;}
.sched-input:focus{border-color:var(--gold);box-shadow:0 0 0 2px rgba(201,168,76,.2);}
.sched-btn{font-family:'Noto Serif JP',serif;font-size:.7rem;padding:7px 0;border-radius:8px;cursor:pointer;border:none;background:linear-gradient(135deg,#2d1f0e,#1a1008);color:var(--gold-l);letter-spacing:.1em;transition:opacity .18s;}
.sched-btn:hover{opacity:.85;}

/* ─── タブ ─── */
.tab-bar{display:flex;gap:0;background:rgba(26,16,8,.95);border-bottom:2px solid var(--gold);position:sticky;top:56px;z-index:99;}
.tab-btn{flex:1;padding:9px 4px;font-family:'Noto Serif JP',serif;font-size:.7rem;letter-spacing:.08em;border:none;background:transparent;color:rgba(232,201,122,.45);cursor:pointer;transition:all .2s;border-bottom:3px solid transparent;margin-bottom:-2px;}
.tab-btn.active{color:var(--gold-l);border-bottom-color:var(--gold-l);background:rgba(201,168,76,.08);}
.tab-btn:hover:not(.active){color:rgba(232,201,122,.7);}
.tab-pane{display:none;}
.tab-pane.active{display:block;}

/* ─── 事業計画ページ ─── */
.plan-wrap{max-width:900px;margin:0 auto;padding:12px 10px;}
.plan-header{background:rgba(42,28,14,.92);border:1px solid rgba(201,168,76,.28);border-radius:12px;padding:12px 14px;margin-bottom:12px;}
.plan-header-title{color:var(--gold-l);font-family:'Kaisei Opti',serif;font-size:.95rem;letter-spacing:.18em;margin-bottom:4px;}
.plan-header-sub{color:rgba(232,201,122,.5);font-size:.6rem;letter-spacing:.1em;}
.plan-title-row{display:flex;align-items:center;gap:8px;margin-top:10px;}
.plan-title-input{font-family:'Noto Serif JP',serif;font-size:.8rem;border:1px solid rgba(201,168,76,.4);border-radius:8px;padding:7px 10px;background:rgba(255,250,235,.9);color:var(--ink);outline:none;flex:1;}
.plan-title-input:focus{border-color:var(--gold);}

/* 日付リスト */
.plan-date-section{margin-bottom:16px;}
.plan-date-section-title{display:flex;align-items:center;gap:7px;padding:8px 12px;border-radius:10px 10px 0 0;font-size:.72rem;font-weight:700;letter-spacing:.1em;}
.pds-ex{background:linear-gradient(135deg,#ffe259,#ffa751);color:#7a4000;}
.pds-a {background:#ffca28;color:#1a1008;}
.plan-date-list{display:flex;flex-direction:column;gap:1px;background:rgba(201,168,76,.1);border-radius:0 0 10px 10px;overflow:hidden;}

/* 各日行 */
.plan-row{background:var(--paper);padding:0;}
.plan-row-hdr{display:flex;align-items:center;gap:0;cursor:pointer;user-select:none;}
.plan-row-date{
  min-width:72px;padding:9px 10px;
  font-family:'Kaisei Opti',serif;font-size:.88rem;font-weight:700;
  color:var(--ink);border-right:3px solid rgba(201,168,76,.2);
  flex-shrink:0;line-height:1.2;
}
.plan-row-date .prd-sub{font-size:.52rem;color:#8d6e4f;font-family:'Noto Serif JP',serif;font-weight:400;}
.plan-row-rank{font-size:.7rem;padding:2px 6px;border-radius:4px;margin:0 8px;flex-shrink:0;}
.prr-ex{background:linear-gradient(135deg,#ffe259,#ffa751);color:#7a4000;font-weight:700;}
.prr-a {background:#ffca28;color:#1a1008;}
.plan-row-preview{flex:1;font-size:.65rem;color:#8d6e4f;padding:0 6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.plan-row-toggle{padding:8px 10px;color:rgba(201,168,76,.5);font-size:.75rem;flex-shrink:0;transition:transform .2s;}
.plan-row.open .plan-row-toggle{transform:rotate(180deg);}

/* 展開エリア */
.plan-row-body{display:none;padding:10px 12px 12px;border-top:1px dashed rgba(201,168,76,.2);background:rgba(255,250,235,.6);}
.plan-row.open .plan-row-body{display:block;}
.plan-koyomi-tags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:8px;}
.plan-koyomi-tag{font-size:.54rem;padding:2px 6px;border-radius:4px;background:rgba(201,168,76,.12);color:#5d4037;border:1px solid rgba(201,168,76,.25);}
.plan-field-label{font-size:.6rem;color:#8d6e4f;letter-spacing:.08em;margin-bottom:3px;margin-top:8px;}
.plan-textarea{font-family:'Noto Serif JP',serif;font-size:.73rem;border:1px solid rgba(201,168,76,.35);border-radius:8px;padding:8px 10px;background:rgba(255,250,235,.9);color:var(--ink);outline:none;width:100%;resize:vertical;min-height:60px;line-height:1.55;}
.plan-textarea:focus{border-color:var(--gold);box-shadow:0 0 0 2px rgba(201,168,76,.15);}
.plan-save-btn{margin-top:8px;font-family:'Noto Serif JP',serif;font-size:.68rem;padding:7px 18px;border-radius:8px;border:none;background:linear-gradient(135deg,#2d1f0e,#1a1008);color:var(--gold-l);cursor:pointer;letter-spacing:.1em;transition:opacity .18s;}
.plan-save-btn:hover{opacity:.85;}
/* 登録済みの内容表示 */
.plan-saved-view{padding:4px 0 2px;}
.plan-saved-text{
  font-size:.72rem;color:var(--ink);line-height:1.6;
  background:rgba(255,255,255,.5);border-radius:6px;
  padding:7px 10px;white-space:pre-wrap;word-break:break-all;
  border:1px solid rgba(201,168,76,.2);min-height:36px;
}
.plan-saved-text.empty{color:#bbb;font-style:italic;}
.plan-edit-btn{
  font-family:'Noto Serif JP',serif;font-size:.65rem;padding:5px 14px;
  border-radius:7px;border:1px solid rgba(201,168,76,.5);
  background:rgba(255,250,235,.9);color:#7a4000;cursor:pointer;
  transition:background .15s;margin-top:8px;
}
.plan-edit-btn:hover{background:rgba(201,168,76,.2);}

/* ランクバッジ：左側縦型 — 幅・高さを完全固定 */
.plan-rank-left{
  flex-shrink:0;
  width:36px;
  align-self:stretch;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;
  box-sizing:border-box;
}
.plan-rank-left .rl-icon{
  font-size:.95rem;line-height:1;
  display:block;text-align:center;width:36px;
}
.plan-rank-left .rl-text{
  font-size:.56rem;font-weight:700;line-height:1;
  display:block;text-align:center;width:36px;
  letter-spacing:.01em;
}
/* ✨最吉バッジ — グロウ＋アイコン大きめ */
.prrl-ex .rl-icon{
  font-size:1.15rem;
  -webkit-text-stroke:2px #fff;
  paint-order:stroke fill;
  filter:drop-shadow(0 0 4px rgba(255,200,0,.9));
}
.prrl-ex .rl-text{font-size:.58rem;}
.prrl-ex{
  background:linear-gradient(160deg,#ffe259,#ffa751);
  color:#7a4000;
  animation:badgePulse 2.2s ease-in-out infinite alternate;
}
@keyframes badgePulse{
  from{background:linear-gradient(160deg,#ffe259,#ffa751);}
  to  {background:linear-gradient(160deg,#ffd700,#ff8c00);}
}
.prrl-a{background:#ffca28;color:#1a1008;}

/* 最吉日行 — 全体を金色ベースで際立たせる */
.plan-row.plan-row-ex{
  background:linear-gradient(100deg,#fffde7 0%,#fff9c4 60%,#fffde7 100%) !important;
  border-top:1px solid rgba(200,134,10,.3);
  border-bottom:1px solid rgba(200,134,10,.3);
}
.plan-row.plan-row-ex>.plan-row-hdr{
  box-shadow:inset 4px 0 0 #c8860a;
}
/* 最吉の日付数字を大きく・金色に */
.plan-row.plan-row-ex .prd-main{
  font-size:1.05rem;
  color:#7a4000;
  text-shadow:0 1px 3px rgba(200,134,10,.3);
}
/* 最吉行の塗り分け上書き（緑・黄よりも最吉感を優先しつつ色を混ぜる） */
.plan-row.plan-row-ex.has-plan  {background:linear-gradient(100deg,#fffde7,#fff9c4) !important;}
.plan-row.plan-row-ex.has-result{background:linear-gradient(100deg,#f1f8e9,#fffde7) !important;}

.plan-row-date{
  min-width:72px;max-width:72px;padding:9px 8px;
  flex-shrink:0;line-height:1.25;
  border-right:1px solid rgba(201,168,76,.15);
}
.prd-main{font-family:'Kaisei Opti',serif;font-size:.9rem;font-weight:700;color:var(--ink);}
.prd-wk{font-size:.58rem;font-weight:400;}
.prd-wk.sat{color:#2c5f8a;}
.prd-wk.sun{color:#c0392b;}
/* 入力状態による行の背景色 */
.plan-row.has-plan   {background:#fffde7;}   /* 活動計画あり：薄黄 */
.plan-row.has-result {background:#f1f8e9;}   /* 実施内容あり：薄緑 */
.plan-row.has-result.has-plan{background:#f1f8e9;} /* 両方あれば緑優先 */
.plan-row.has-plan   .plan-row-hdr{background:rgba(255,249,196,.6);}
.plan-row.has-result .plan-row-hdr{background:rgba(200,230,201,.45);}
.plan-progress-bar{height:4px;background:rgba(201,168,76,.15);border-radius:2px;margin-top:10px;overflow:hidden;}
.plan-progress-fill{height:100%;background:linear-gradient(90deg,#c9a84c,#e8c97a);border-radius:2px;transition:width .4s;}
.plan-progress-txt{font-size:.56rem;color:rgba(232,201,122,.6);text-align:right;margin-top:2px;}
.plan-empty{text-align:center;padding:30px;color:rgba(232,201,122,.4);font-size:.75rem;}

@media(min-width:600px){
  .dc{min-height:122px;}
  .ki{width:22px;height:22px;font-size:.82rem;}
  .ki-xl{width:28px;height:28px;font-size:1.1rem;}
  .dn{font-size:1.1rem;}
}

/* ─── ツカサブロック（モーダル内） ─── */
.tsukasa-block{
  background:linear-gradient(135deg,rgba(139,105,20,.1) 0%,rgba(201,168,76,.06) 100%);
  border:1px solid rgba(201,168,76,.4);
  border-radius:12px;
  padding:11px 13px;
  margin-bottom:10px;
}
.tsukasa-block-title{
  display:flex;align-items:center;gap:7px;
  font-size:.68rem;font-weight:700;letter-spacing:.12em;
  color:#7a4000;
  border-bottom:1px solid rgba(201,168,76,.25);
  padding-bottom:5px;margin-bottom:9px;
  font-family:'Kaisei Opti',serif;
}
.tsukasa-tag{
  display:inline-block;font-size:.5rem;padding:1px 6px;border-radius:10px;
  background:linear-gradient(135deg,#c9a84c,#e8c97a);color:#1a1008;
  font-weight:700;letter-spacing:.05em;margin-right:4px;vertical-align:middle;
}
.tsukasa-essence{
  font-size:.66rem;color:#5a3a00;background:rgba(201,168,76,.1);
  border-radius:7px;padding:5px 9px;margin-bottom:8px;line-height:1.6;
  border-left:3px solid rgba(201,168,76,.5);font-style:italic;
}
.tsukasa-items{display:flex;flex-direction:column;gap:5px;}
.tsukasa-item{
  display:flex;align-items:flex-start;gap:8px;
  background:rgba(255,255,255,.55);border:1px solid rgba(201,168,76,.2);
  border-radius:8px;padding:6px 9px;font-size:.65rem;color:#2c1810;line-height:1.5;
}
.tsukasa-item-num{
  flex-shrink:0;width:18px;height:18px;border-radius:50%;
  background:linear-gradient(135deg,#c9a84c,#e8c97a);
  color:#1a1008;font-size:.58rem;font-weight:900;
  display:flex;align-items:center;justify-content:center;margin-top:1px;
}
.tsukasa-item-body strong{display:block;font-size:.66rem;color:#7a4000;margin-bottom:1px;}
.tsukasa-note{
  font-size:.58rem;color:rgba(122,64,0,.6);margin-top:7px;
  background:rgba(201,168,76,.07);border-radius:6px;padding:4px 8px;line-height:1.5;
}

/* ─── 吉日辞書タブ ─── */
.jitsu-wrap{max-width:900px;margin:0 auto;padding:12px 10px;}
.jitsu-header{
  background:linear-gradient(135deg,rgba(201,168,76,.15),rgba(201,168,76,.08));
  border:1px solid rgba(201,168,76,.3);border-radius:12px;
  padding:12px 14px;margin-bottom:12px;text-align:center;
}
.jitsu-header-title{
  font-family:'Kaisei Opti',serif;color:var(--gold-l);
  font-size:1rem;letter-spacing:.2em;margin-bottom:4px;
}
.jitsu-header-sub{font-size:.6rem;color:rgba(232,201,122,.6);letter-spacing:.1em;}
.jitsu-card{
  background:rgba(250,243,224,.97);border-radius:12px;
  margin-bottom:10px;overflow:hidden;
  box-shadow:0 2px 12px rgba(0,0,0,.15),0 0 0 1px rgba(201,168,76,.2);
}
.jitsu-card-hdr{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;cursor:pointer;
  border-bottom:1px solid rgba(201,168,76,.15);
  background:rgba(201,168,76,.06);
  transition:background .15s;
}
.jitsu-card-hdr:hover{background:rgba(201,168,76,.12);}
.jitsu-card-icon{
  width:36px;height:36px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.2rem;font-weight:900;flex-shrink:0;
  border:2px solid;background:#fff;font-family:'Noto Serif JP',serif;
}
.jitsu-card-meta{flex:1;}
.jitsu-card-name{font-family:'Kaisei Opti',serif;font-size:.85rem;font-weight:700;color:var(--ink);}
.jitsu-card-yomi{font-size:.58rem;color:#8d6e4f;letter-spacing:.05em;}
.jitsu-card-freq{font-size:.55rem;color:rgba(201,168,76,.8);background:rgba(201,168,76,.1);padding:2px 7px;border-radius:10px;white-space:nowrap;}
.jitsu-card-toggle{font-size:.65rem;color:#8d6e4f;transition:transform .2s;}
.jitsu-card.open .jitsu-card-toggle{transform:rotate(180deg);}
.jitsu-card-body{display:none;padding:12px 14px;}
.jitsu-card.open .jitsu-card-body{display:block;}
.jitsu-essence-box{
  background:linear-gradient(135deg,rgba(201,168,76,.1),rgba(201,168,76,.05));
  border:1px solid rgba(201,168,76,.25);border-radius:8px;
  padding:8px 11px;margin-bottom:10px;
  font-size:.68rem;color:#5a3a00;line-height:1.65;
  border-left:4px solid rgba(201,168,76,.5);font-style:italic;
}
.jitsu-section-ttl{
  font-size:.62rem;font-weight:700;color:#8d6e4f;
  letter-spacing:.1em;margin-bottom:6px;
  display:flex;align-items:center;gap:4px;

<script>
// =====================================================
// 暦計算
// =====================================================
const ROKU_N=['先勝','友引','先負','仏滅','大安','赤口'];
const JOKU_N=['建','除','満','平','定','執','破','危','成','納','開','閉'];
const KAN_K=['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
const KAN_S=['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
const KYU_N=['一白','二黒','三碧','四緑','五黄','六白','七赤','八白','九紫'];
const GOG_K=['木','木','火','火','土','土','金','金','水','水'];
const NIJU_N=['角','亢','氐','房','心','尾','箕','斗','女','虚','危','室','壁','奎','婁','胃','昴','毕','觜','参','井','鬼','柳','星','張','翼','軫','角'];

const BASE=new Date(2026,0,1);
function ddf(y,m,d){return Math.round((new Date(y,m-1,d)-BASE)/86400000);}
function kanIdx(y,m,d){return(11+ddf(y,m,d)+600)%60;}
function getKanshi(y,m,d){const i=kanIdx(y,m,d);return KAN_K[i%10]+KAN_S[i%12];}
function getGogyou(y,m,d){return GOG_K[kanIdx(y,m,d)%10];}
function getRoku(y,m,d){return ROKU_N[(2+ddf(y,m,d))%6];}
function getJoku(y,m,d){return JOKU_N[(8+ddf(y,m,d))%12];}
function getNiju(y,m,d){return NIJU_N[(21+ddf(y,m,d))%28];}
function getKyu(y,m,d){return KYU_N[(2+ddf(y,m,d))%9];}
function kanName(y,m,d){return kanIdx(y,m,d)%10;}
function shiName(y,m,d){return kanIdx(y,m,d)%12;}
function isKimiDay(y,m,d){return kanName(y,m,d)===5&&shiName(y,m,d)===5;}
function isTora(y,m,d){return shiName(y,m,d)===2;}
function isKinoeNe(y,m,d){return kanName(y,m,d)===0&&shiName(y,m,d)===0;}

// =====================================================
// 月齢計算
// 2026年の新月・満月データ（国立天文台暦要項より）
// =====================================================
// 新月(🌚) と 満月(🌝) の日付（JST）
const MOON_PHASES_2026={
  newmoon:[  // 新月（e-moon.net / cooria.jp より）
    '0119','0217','0319','0417','0517',
    '0615','0714','0813','0911','1011',
    '1109','1209'
  ],
  fullmoon:[ // 満月（e-moon.net / cooria.jp より）
    '0103','0202','0303','0402','0502',
    '0531','0630','0729','0828','0927',
    '1026','1124','1224'
  ]
};

// 月齢取得（0〜29.5）
// 基準: 2026/1/19 = 新月(月齢0)
// 正確なデータは e-moon.net/calendar_list/calendar_moon_2026/ より
// 基準点: 2026/1/19 = 新月 = 月齢0
function getMoonAge(y,m,d){
  const refNewMoon=new Date(2026,0,19); // 1/19新月
  const target=new Date(y,m-1,d);
  const diff=Math.round((target-refNewMoon)/86400000);
  let age=((diff%29.5)+29.5)%29.5;
  return Math.round(age*10)/10;
}

function isNewMoon(y,m,d){
  const ds=String(m).padStart(2,'0')+String(d).padStart(2,'0');
  return MOON_PHASES_2026.newmoon.includes(ds);
}
function isFullMoon(y,m,d){
  const ds=String(m).padStart(2,'0')+String(d).padStart(2,'0');
  return MOON_PHASES_2026.fullmoon.includes(ds);
}

// 月の状態（上弦期 / 満月期 / 下弦期 / 新月期）
// 自然農法での判断に使用
function getMoonPhaseType(y,m,d){
  const age=getMoonAge(y,m,d);
  if(age<2||age>=28) return 'new';        // 新月期（±2日）
  if(age>=2&&age<7)  return 'waxing1';    // 上弦前（新月→上弦）
  if(age>=7&&age<13) return 'waxing2';    // 上弦後（上弦→満月直前）
  if(age>=13&&age<16) return 'full';      // 満月期（±1.5日）
  if(age>=16&&age<22) return 'waning1';   // 下弦前（満月→下弦）
  if(age>=22&&age<28) return 'waning2';   // 下弦後（下弦→新月直前）
  return 'new';
}

// =====================================================
// 二十四節気 2026年（国立天文台暦要項より）
// =====================================================
const SETKI_2026={
  '0105':'小寒（しょうかん）',
  '0120':'大寒（だいかん）',
  '0204':'立春（りっしゅん）',
  '0219':'雨水（うすい）',
  '0306':'啓蟄（けいちつ）',
  '0320':'春分（しゅんぶん）',
  '0405':'清明（せいめい）',
  '0420':'穀雨（こくう）',
  '0505':'立夏（りっか）',
  '0521':'小満（しょうまん）',
  '0606':'芒種（ぼうしゅ）',
  '0621':'夏至（げし）',
  '0707':'小暑（しょうしょ）',
  '0723':'大暑（たいしょ）',

// 自然農法アドバイス（月齢フェーズ×節気）
// =====================================================
function getNatureAdvice(y,m,d){
  const phase=getMoonPhaseType(y,m,d);
  const setki=getSetki(y,m,d);
  const ds=String(m).padStart(2,'0')+String(d).padStart(2,'0');
  const isNM=isNewMoon(y,m,d);
  const isFM=isFullMoon(y,m,d);
  const advice=[];

  // 月齢フェーズ別アドバイス
  switch(phase){
    case 'new':
      advice.push({icon:'🌚',title:'新月期（エネルギーが地中へ）',
        text:'根の生長が最も活発な時期。根菜類の収穫・保存に最適。\n地下に根を張る種まきにも良い日。\n土の整備・耕作を行うのに適した時期。'});
      break;
    case 'waxing1':
      advice.push({icon:'🌒',title:'新月〜上弦（植物が芽吹く力）',
        text:'地上部へエネルギーが上昇し始める時期。\n葉物野菜・葉茎類の種まきに最適。\n苗の定植にも良いタイミング。水やりを始めると発根しやすい。'});
      break;
    case 'waxing2':
      advice.push({icon:'🌓',title:'上弦〜満月（栄養成長が最盛期）',
        text:'葉・茎・地上部の生長が最も旺盛な時期。\n葉物野菜の収穫・果菜類の植え付けに最適。\n施肥（液肥）の吸収率が高い。剪定・芽かきは避ける。'});
      break;
    case 'full':
      advice.push({icon:'🌝',title:'満月期（実の充実・水分最大）',
        text:'果実・実に水分・栄養分が最も集まる時期。\n果実の収穫に最適（瑞々しく美味しくなる）。\n種採りは満月前後が最良。害虫の孵化に注意。'});
      break;
    case 'waning1':
      advice.push({icon:'🌖',title:'満月〜下弦（生殖成長が活発）',
        text:'花・実の成長が活発な時期。\n果菜類（トマト・キュウリ等）の収穫に最適。\n根元への施肥に適した時期。草刈り・剪定も可。'});
      break;
    case 'waning2':
      advice.push({icon:'🌘',title:'下弦〜新月（休息と蓄え）',
        text:'植物のエネルギーが根に戻っていく時期。\n根菜類の収穫・保存に最適。\n土の耕作・堆肥の鋤き込みに適した時期。\n木の伐採は新月前後が材木として長持ちする。'});
      break;
  }

  // 新月・満月当日の特記
  if(isNM){
    advice.push({icon:'🌑',title:'新月当日',text:'潮の干満が最大になる大潮。\n根の活性が特に高まる日。\n新しい種まき・新規の農作業始めに縁起の良い日。'});
  }
  if(isFM){
    advice.push({icon:'🌕',title:'満月当日',text:'潮の干満が最大になる大潮。\n害虫（ガ・アブラムシ等）が孵化・産卵しやすい日。\n収穫した果実は最も瑞々しく美味しい。\n草木灰を根元に撒くと害虫忌避に効果的。'});
  }

  // 節気当日の農作業アドバイス
  if(setki&&SETKI_ADVICE[setki]){
    advice.push({icon:'🌿',title:`二十四節気：${setki}`,text:SETKI_ADVICE[setki]});
  }

  // 月×季節の特別アドバイス
  const mon=m;
  if((phase==='waxing1'||phase==='waxing2')&&(mon>=3&&mon<=5)){
    advice.push({icon:'🌱',title:'種まきのベストタイミング',text:'春の上弦期は一年で最も種まきに適した時期。\n発芽率・根付きが格段に良くなります。\nできるだけ種まきを優先しましょう。'});
  }
  if(phase==='full'&&(mon>=6&&mon<=9)){
    advice.push({icon:'🍅',title:'夏の収穫適期',text:'夏の満月期は果実類の収穫に最高の時期。\nトマト・キュウリ・ナスなどが最も美味しくなります。\n朝の収穫が特におすすめ。'});
  }
  if((phase==='waning2'||phase==='new')&&(mon>=9&&mon<=11)){
    advice.push({icon:'🥕',title:'秋の根菜収穫期',text:'秋の下弦〜新月期は根菜の収穫に最適。\n大根・人参・里芋などが充実している時期。\n保存性も高まります。'});
  }

  return advice;
}

      desc:'地上部に水分・栄養が最も\n集まる時期。果菜類・葉物の\n収穫に最適です。'});
  }
  if(phase==='waning2'||phase==='new'){
    ev.push({cat:'nature',icon:'休',shape:'ki',cls:'c-nm-rest',
      label:`畑の整備・土づくり（${phase==='new'?'新月期':'下弦後'}）`,
      desc:'植物のエネルギーが根に戻る時期。\n耕作・堆肥の鋤き込み・\n土の整備に最適な時期です。'});
  }
  if(phase==='waxing1'||phase==='waxing2'||phase==='full'){
    ev.push({cat:'nature',icon:'水',shape:'ki',cls:'c-nm-wg',
      label:'水やり◎（満ち潮期）',
      desc:'月が満ちていく時期は植物の\n水分吸収力が高まります。\n水やり・液肥の施用に最適。'});
  }
  if(phase==='waning2'){
    ev.push({cat:'nature',icon:'草',shape:'ki',cls:'c-nm-gg',
      label:'草刈り・剪定に良い時期',
      desc:'月が欠けていく時期に刈った草は\n再生が遅くなります。\n草刈り・不要枝の剪定に最適。'});
  }

  return ev;
}

  if(roku==='赤口'){ev.push({cat:'event',icon:'赤',shape:'ki',cls:'c-ca',label:'赤口（六曜）',desc:'正午のみ吉、朝晩は凶。祝い事は大凶。'});}

  const tOK=['成','開','満','建','定','平'].includes(joku)&&['大安','先勝','友引'].includes(roku)&&!['参','危'].includes(niju)&&!(SP.jushi[m]||[]).includes(d)&&!(SP.fusei[m]||[]).includes(d);
  if(tOK&&!ev.some(e=>e.cat==='travel'&&e.cls==='c-tb')){ev.push({cat:'travel',icon:'旅',shape:'ki',cls:'c-tg',label:'旅行 好適日◎',desc:'六曜・十二直・二十八宿の組み合わせが旅行に最適な日。'});}

  // ─── 事業・新規開始の吉日判定 ───
  // NG条件（即除外）
  const stNG=(SP.jushi[m]||[]).includes(d)||(SP.fusei[m]||[]).includes(d)||
             ['破','危','閉'].includes(joku)||['仏滅','赤口'].includes(roku)||
             ['参','危'].includes(niju);
  if(!stNG){
    let stScore=0;
    const stGoodJoku=['開','成','建','定','満'];
    const stOkJoku=['除','平','納'];
    if(stGoodJoku.includes(joku)) stScore+=3;
    else if(stOkJoku.includes(joku)) stScore+=1;
    if(roku==='大安') stScore+=3;
    else if(roku==='先勝') stScore+=2;
    else if(roku==='友引') stScore+=1;
    if(['室','軫','氐','張','角','房'].includes(niju)) stScore+=2;
    if(SP.tensha.includes(ds)) stScore+=4;
    if((SP.ichiryu[m]||[]).includes(d)) stScore+=2;
    if(isKimiDay(y,m,d)||isKinoeNe(y,m,d)) stScore+=1;
    const mercRetro=typeof getRetrogradePlanets==='function'&&getRetrogradePlanets(y,m,d).some(p=>p.id==='mercury');
    if(mercRetro) stScore-=2;

    // 大吉日の追加必須条件：吉十二直＋（大安 or 先勝）の両立が必要
    const stAOK=stGoodJoku.includes(joku)&&['大安','先勝'].includes(roku);

    if(stScore>=8){
      const mercNote=mercRetro?'\n⚠️水星逆行中：契約・書類に二重確認を':'';
      ev.push({cat:'startup',icon:'起',shape:'ki-xl',cls:'c-st-ex',
        label:'事業開始 最吉日✨',
        desc:`天赦日・大安・十二直などが重なる最高の開業日。\n新規事業・開店・契約開始に大吉。${mercNote}`});
    } else if(stScore>=7&&stAOK){
      // 大吉：閾値7以上＋吉十二直×大安or先勝 の両立必須
      const mercNote=mercRetro?'\n⚠️水星逆行中：慎重に':'';
      ev.push({cat:'startup',icon:'起',shape:'ki',cls:'c-st-a',
        label:'事業開始 大吉日◎',
        desc:`六曜・十二直・二十八宿の組合せが事業開始に優れた日。\n開業・新規契約・プロジェクト始動に吉。${mercNote}`});
    } else if(stScore>=3){
      const mercNote=mercRetro?'（水星逆行中：書類注意）':'';
      ev.push({cat:'startup',icon:'起',shape:'ki',cls:'c-st-s',
        label:`事業開始 吉日○${mercNote}`,
        desc:'事業・新規開始に適した日。\n大きな決断より、準備・仕込み開始に向いた日。'});
    }
  }

  return ev;
}

// 指定日に逆行中の惑星一覧を返す
function getRetrogradePlanets(y,m,d){
  if(y!==2026) return[];
  const result=[];
  for(const pl of RETRO_PLANETS){
    for(const per of pl.periods){
      const [sm,sd]=per.s, [em,ed]=per.e;
      const startN=sm*100+sd, endN=em*100+ed, targetN=m*100+d;
      if(targetN>=startN&&targetN<=endN){
        result.push({...pl, periodNote:per.note, periodStart:per.s, periodEnd:per.e});
        break;
      }
    }
  }
  return result;
}

// 逆行開始日かどうか
function isRetrogradeStart(y,m,d){
  if(y!==2026) return[];
  const result=[];
  for(const pl of RETRO_PLANETS){
    for(const per of pl.periods){
      if(per.s[0]===m&&per.s[1]===d) result.push({...pl,periodNote:per.note});
    }
  }
  return result;
}

// 逆行終了日かどうか
function isRetrogradeEnd(y,m,d){
  if(y!==2026) return[];
  const result=[];
  for(const pl of RETRO_PLANETS){
    for(const per of pl.periods){
      if(per.e[0]===m&&per.e[1]===d) result.push({...pl,periodNote:per.note});
    }
  }
  return result;
}

function dkey(y,m,d){return`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}

// =====================================================
// 月の最良日・最悪日スコア計算
// =====================================================
function calcDayScore(y,m,d){
  let score=0;
  const joku=getJoku(y,m,d),roku=getRoku(y,m,d);
  const ds=String(m).padStart(2,'0')+String(d).padStart(2,'0');
  const phase=getMoonPhaseType(y,m,d);
  const isFM=isFullMoon(y,m,d),isNM=isNewMoon(y,m,d);

  // 六曜
  if(roku==='大安') score+=4;
  else if(roku==='先勝'||roku==='友引') score+=2;
  else if(roku==='先負') score+=1;
  else if(roku==='赤口') score-=2;
  else if(roku==='仏滅') score-=3;

  // 十二直
  if(['開','成','満'].includes(joku)) score+=3;
  else if(['建','定','除','納'].includes(joku)) score+=2;
  else if(['閉','執'].includes(joku)) score-=1;
  else if(['破','危'].includes(joku)) score-=3;

  // 天赦日・一粒万倍日
  if(SP.tensha.includes(ds)) score+=5;
  if((SP.ichiryu[m]||[]).includes(d)) score+=3;

  // 受死日・不成就日
  if((SP.jushi[m]||[]).includes(d)) score-=5;
  if((SP.fusei[m]||[]).includes(d)) score-=3;

  // 己巳・寅・甲子
  const ki=kanIdx(y,m,d);
  if(ki%10===5&&ki%12===5) score+=2; // 己巳
  if(ki%12===2) score+=1;             // 寅
  if(ki%10===0&&ki%12===0) score+=2; // 甲子

  // 満月・新月（吉）
  if(isFM||isNM) score+=1;

  // 月齢フェーズ（上弦前後は種まき最良）
  if(phase==='waxing1'||phase==='waxing2') score+=1;

  return score;
}

function getBestWorstDays(y,m){
  const days=new Date(y,m,0).getDate();
  let bestScore=-999,worstScore=999;
  // まずスコアの最大・最小を確定
  for(let d=1;d<=days;d++){
    const sc=calcDayScore(y,m,d);
    if(sc>bestScore) bestScore=sc;
    if(sc<worstScore) worstScore=sc;
  }
  // 同率の場合は六曜優先度でタイブレーク（大安>友引>先勝>先負>赤口>仏滅）
  const rokuPrio={'大安':6,'友引':5,'先勝':4,'先負':3,'赤口':2,'仏滅':1};
  let best={d:0,score:-999,rprio:0},worst={d:0,score:999,rprio:99};
  for(let d=1;d<=days;d++){
    const sc=calcDayScore(y,m,d);
    const rp=rokuPrio[getRoku(y,m,d)]||0;
    if(sc>best.score||(sc===best.score&&rp>best.rprio)){best={d,score:sc,rprio:rp};}
    if(sc<worst.score||(sc===worst.score&&rp<worst.rprio)){worst={d,score:sc,rprio:rp};}
  }
  return{best:best.d,worst:worst.d,bestScore,worstScore};
}

// 年内の事業開始吉日を全スキャンして返す
function getAllStartupDays(y){
  const ex=[],a=[],s=[];
  const mDays=[31,28,31,30,31,30,31,31,30,31,30,31]; // 2026年
  for(let m=1;m<=12;m++){
    for(let d=1;d<=mDays[m-1];d++){
      const ev=getKoyomiEvents(y,m,d);
      const st=ev.find(e=>e.cat==='startup');
      if(!st) continue;
      const label=`${m}/${d}`;
      if(st.cls==='c-st-ex') ex.push(label);
      else if(st.cls==='c-st-a') a.push(label);
      else s.push(label);
    }
  }
  return{ex,a,s};
}
// 起動時に一度だけ計算してキャッシュ
let _startupDays=null;
function getStartupDaysCache(){
  if(!_startupDays) _startupDays=getAllStartupDays(2026);
  return _startupDays;
}


// 土用期間判定ヘルパー
function getDoyouInfo(y,m,d){
  const td=m*100+d;
  for(const p of SP.doyou){
    if(td>=p.s&&td<=p.e){
      const isStart=(td===p.s);
      const isEnd  =(td===p.e);
      // 土用名（季節）
      const s=p.s;
      const name=s<300?'冬土用':s<600?'春土用':s<900?'夏土用':'秋土用';
      return{active:true,isStart,isEnd,name};
    }
  }
  return{active:false};
}

function render(){
  const mN=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('mTitle').textContent=`${year}年 ${mN[month-1]}`;
  const days=new Date(year,month,0).getDate();
  const first=new Date(year,month-1,1).getDay();
  const today=new Date();

  // 最良日・最悪日を事前計算（同率対応）
  const{best:bestDay,worst:worstDay,bestScore,worstScore}=getBestWorstDays(year,month);

  let html='';
  for(let i=0;i<first;i++) html+='<div class="dc emp"></div>';

  for(let d=1;d<=days;d++){
    const dow=new Date(year,month-1,d).getDay();
    const isToday=today.getFullYear()===year&&today.getMonth()+1===month&&today.getDate()===d;
    const ds=String(month).padStart(2,'0')+String(d).padStart(2,'0');
    const hol=SP.holidays[ds]||null;
    const joku=getJoku(year,month,d),niju=getNiju(year,month,d);
    const roku=getRoku(year,month,d),kyu=getKyu(year,month,d),kan=getKanshi(year,month,d);
    const isFM=isFullMoon(year,month,d);
    const isNM=isNewMoon(year,month,d);
    const setki=getSetki(year,month,d);
    const moonAge=getMoonAge(year,month,d);
    const ryC={'大安':'r0','仏滅':'r1','赤口':'r2','先勝':'r3','友引':'r4','先負':'r5'}[roku]||'';
    const doyouInfo=getDoyouInfo(year,month,d);
    const retroPlanets=getRetrogradePlanets(year,month,d);
    const retroStarts=isRetrogradeStart(year,month,d);
    const retroEnds=isRetrogradeEnd(year,month,d);

    const koyomiEv=getKoyomiEvents(year,month,d);
    const moonEv=getMoonNatureEvents(year,month,d);
    const allEv=[...koyomiEv,...moonEv];
    const fil=allEv.filter(e=>filters.has(e.cat));
    const xlEv=fil.filter(e=>e.shape==='ki-xl');
    const smEv=fil.filter(e=>e.shape==='ki').slice(0,6);

    let cc='dc';
    if(dow===0||hol) cc+=' sun'; else if(dow===6) cc+=' sat';
    if(hol) cc+=' hol';
    if(isToday) cc+=' tod';
    // 同率最良日は全てハイライト（タイブレーク後の代表日を筆頭に）
    const dayScore=calcDayScore(year,month,d);
    if(dayScore===bestScore&&!isToday) cc+=' best-day';
    if(dayScore===worstScore&&!isToday) cc+=' worst-day';
    // 最吉日セルハイライト（事業開始フィルターON時）
    if(filters.has('startup')&&koyomiEv.some(e=>e.cls==='c-st-ex')&&!isToday) cc+=' startup-ex';

    // 土用バナー（フィルターON時のみ）
    let doyouBanner='';
    if(doyouInfo.active && filters.has('doyou')){
      doyouBanner=`<div class="doyou-bar"></div>`;
      // 初日はラベル表示
      if(doyouInfo.isStart){
        doyouBanner+=`<div class="doyou-label">🟠${doyouInfo.name}入り</div>`;
      }
    }

    // 惑星逆行バナー（フィルターON時のみ）
    let retroBanners='';
    let retroLabelHtml='';
    const showRetro=filters.has('retrograde')&&retroPlanets.length>0;
    if(showRetro){
      let topPx=0;
      retroPlanets.forEach((pl)=>{
        const barH=pl.id==='mercury'?9:5;
        retroBanners+=`<div class="retro-bar ${pl.barClass}" style="top:${topPx}px;height:${barH}px"></div>`;
        topPx+=barH;
      });
      const labelTop=(doyouInfo.active&&filters.has('doyou')?5:0)+topPx;
      // 逆行開始日ラベル
      retroStarts.forEach(pl=>{
        retroLabelHtml+=`<div class="retro-label" style="color:${pl.id==='mercury'?'#00b4d8':pl.color};padding-top:${labelTop+2}px">${pl.emoji}${pl.name}逆行IN</div>`;
      });
      // 逆行終了日ラベル
      retroEnds.forEach(pl=>{
        retroLabelHtml+=`<div class="retro-label" style="color:${pl.id==='mercury'?'#00b4d8':pl.color};padding-top:${labelTop+2}px">${pl.emoji}${pl.name}順行→</div>`;
      });
    }

    // 土用期間中はセルにpadding-topを追加（バナー分）
    const doyouH=doyouInfo.active&&filters.has('doyou')?5:0;
    const retroH=showRetro?retroPlanets.reduce((s,pl)=>s+(pl.id==='mercury'?9:5),0):0;
    const totalBannerH=doyouH+retroH;
    const cellStyle=totalBannerH>0?`style="padding-top:${totalBannerH+4}px"`:'';

    // セルに逆行中クラスを追加
    if(showRetro) cc+=' retro-active';

    // 月齢表示
    let moonRow='';
    if(isFM) moonRow=`<div class="moon-row-big moon-full"><span class="moon-emoji">🌝</span><span class="moon-txt">満月</span></div>`;
    else if(isNM) moonRow=`<div class="moon-row-big moon-new"><span class="moon-emoji">🌚</span><span class="moon-txt">新月</span></div>`;
    else moonRow=`<div class="kl">月齢${moonAge}</div>`;

    let setkiRow='';
    if(setki) setkiRow=`<div class="kl"><span class="setki-badge">🌿${setki.split('（')[0]}</span></div>`;

    const icons=[
      ...xlEv.map(e=>iconHtml(e)),
      ...smEv.map(e=>iconHtml(e)),
    ].join('');

    const scList=getSchedFor(year,month,d);
    let scHtml='';
    if(scList.length>0){
      scHtml='<div class="ev-list">';
      scList.slice(0,2).forEach(sc=>{
        scHtml+=`<div class="ev-chip" style="font-weight:700;color:#1a1008;border:1px solid rgba(44,24,16,.25);background:rgba(44,24,16,.04)">${sc.text}</div>`;
      });
      if(scList.length>2) scHtml+=`<div class="ev-more">+${scList.length-2}件</div>`;
      scHtml+='</div>';
    }

    // 最良・最悪バッジ（代表日にのみ表示、同率の場合は「並」を付記）
    let rankBadge='';
    if(d===bestDay){
      const tieCount=Array.from({length:days},(_,i)=>calcDayScore(year,month,i+1)).filter(s=>s===bestScore).length;
      rankBadge=`<div style="font-size:.4rem;color:#e65100;font-weight:700;letter-spacing:.05em;margin-bottom:1px">★今月最良日${tieCount>1?'（同率'+tieCount+'日）':''}</div>`;
    }
    if(d===worstDay){
      const tieCount=Array.from({length:days},(_,i)=>calcDayScore(year,month,i+1)).filter(s=>s===worstScore).length;
      rankBadge=`<div style="font-size:.4rem;color:#757575;font-weight:700;letter-spacing:.05em;margin-bottom:1px">▲今月注意日${tieCount>1?'（同率'+tieCount+'日）':''}</div>`;
    }

    html+=`
      <div class="${cc}" onclick="openDetail(${year},${month},${d})">
        ${doyouBanner}
        ${retroBanners}
        ${retroLabelHtml}
        ${rankBadge}
        <div class="dn-row" ${cellStyle}>
          <span class="dn">${d}</span>
          <span class="ry ${ryC}">${roku}</span>
        </div>
        <div class="kl">${kan} ${kyu}星</div>
        <div class="kl">${joku}・${niju}</div>
        ${moonRow}
        ${setkiRow}
        <div class="icons">${icons}</div>
        ${scHtml}
      </div>`;
  }
  document.getElementById('calGrid').innerHTML=html;
}

// ツカサデータ判定：指定日にツカサ情報があるか返す
function getTsukasaData(y,m,d){
  const ki=kanIdx(y,m,d);
  const results=[];
  // 寅の日
  if(ki%12===2){
    const key=`${m}-tora`;
    if(TSUKASA_DATA[key]) results.push(TSUKASA_DATA[key]);
  }
  // 己巳の日（ki%10===5 && ki%12===5）
  if(ki%10===5&&ki%12===5){
    const key=`${m}-mi`;
    if(TSUKASA_DATA[key]) results.push(TSUKASA_DATA[key]);
  }
  // 甲子の日（ki%10===0 && ki%12===0）
  if(ki%10===0&&ki%12===0){
    const key=`${m}-kinoeNe`;
    if(TSUKASA_DATA[key]) results.push(TSUKASA_DATA[key]);
  }
  return results;
}

function renderTsukasaBlock(y,m,d){
  const el=document.getElementById('tsukasaBlock');
  const data=getTsukasaData(y,m,d);
  if(!data.length){el.innerHTML='';return;}
  el.innerHTML=data.map(t=>`
    <div class="tsukasa-block">
      <div class="tsukasa-block-title">
        <span class="tsukasa-tag">ツカサ</span>${t.title}
      </div>
      <div class="tsukasa-essence">「${t.tag}」<br>${t.essence}</div>
      <div class="tsukasa-items">
        ${t.items.map((it,i)=>`
          <div class="tsukasa-item">
            <div class="tsukasa-item-num">${i+1}</div>
            <div class="tsukasa-item-body">
              <strong>${it.title}</strong>${it.detail}
            </div>
          </div>`).join('')}
      </div>
      ${t.note?`<div class="tsukasa-note">${t.note}</div>`:''}

}

// 吉日辞書ページ描画
function renderJitsuPage(){
  const today=new Date();
  const todayY=today.getFullYear();
  const todayM=today.getMonth()+1;
  const todayD=today.getDate();

  // 月別オブジェクト形式（'2026年1月':[3,9,...] ）をチップに変換
  function renderMonthlyDates(obj){
    if(!obj||typeof obj==='string') return`<span class="jitsu-dates-ttl">${obj||'計算で自動判定'}</span>`;
    // is_list_format（天赦日の特別形式）は別処理
    const chips=[];
    let curYear='';
    Object.entries(obj).forEach(([label,days])=>{
      // ラベル例: '2026年1月'
      const ymatch=label.match(/(\d{4})年(\d+)月/);
      if(!ymatch) return;
      const y=Number(ymatch[1]), m=Number(ymatch[2]);
      if(String(y)!==curYear){
        if(curYear) chips.push(`</div></div>`);
        chips.push(`<div class="jitsu-year-block"><div class="jitsu-year-ttl">${y}年</div><div class="jitsu-dates-chips">`);
        curYear=String(y);
      }
      days.forEach(d=>{
        const isToday=(y===todayY&&m===todayM&&d===todayD);
        chips.push(`<span class="jitsu-date-chip${isToday?' today':''}" title="${y}/${m}/${d}">${m}/${d}${isToday?' ◀今日':''}</span>`);
      });
    });
    if(curYear) chips.push(`</div></div>`);
    return chips.join('');
  }

  // 天赦日の特別リスト形式（年→文字列配列）
  function renderTenshaList(dates_list){
    let html='';
    Object.entries(dates_list).forEach(([year,items])=>{
      html+=`<div class="jitsu-year-block"><div class="jitsu-year-ttl">${year}</div><div class="jitsu-dates-chips">`;
      items.forEach(item=>{
        // 今日かどうか判定: item先頭 "3/5（..." から月日を取得
        const dmatch=item.match(/^(\d+)\/(\d+)/);
        let isToday=false;
        if(dmatch){
          const [,m,d]=dmatch.map(Number);
          const y=Number(year.replace('年',''));
          isToday=(y===todayY&&m===todayM&&d===todayD);
        }
        // 最強フラグ
        const isSaikyou=item.includes('★最強');
        const chipCls='jitsu-date-chip'+(isSaikyou?' saikyo':'')+(isToday?' today':'');
        html+=`<span class="${chipCls}">${item.replace(' ★最強','')}${isSaikyou?' ★':''}</span>`;
      });
      html+=`</div></div>`;
    });
    return html;
  }

  function buildDatesSection(j){
    if(j.is_list_format&&j.dates_list){
      return`<div class="jitsu-dates-box">
        <div class="jitsu-dates-ttl">📅 2026年〜2027年3月の天赦日</div>
        ${renderTenshaList(j.dates_list)}
      </div>`;
    }
    if(j.dates2026){
      return`<div class="jitsu-dates-box">
        <div class="jitsu-dates-ttl">📅 2026年〜2027年3月の日付一覧</div>
        ${renderMonthlyDates(j.dates2026)}
      </div>`;
    }
    return'';
  }

  document.getElementById('jitsuGrid').innerHTML=JITSU_DICT.map(j=>`
    <div class="jitsu-card" id="jc-${j.id}">
      <div class="jitsu-card-hdr" onclick="toggleJitsu('${j.id}')">
        <div class="jitsu-card-icon ${j.iconCls}${j.xl?' xl':''}" style="border-color:${j.color}">${j.icon}</div>
        <div class="jitsu-card-meta">
          <div class="jitsu-card-name" style="color:${j.color}">${j.name}</div>
          <div class="jitsu-card-yomi">${j.yomi}</div>
        </div>
        <span class="jitsu-card-freq">${j.freq}</span>
        <span class="jitsu-card-toggle">▼</span>
      </div>
      <div class="jitsu-card-body">
        <div class="jitsu-essence-box">「${j.essence}」</div>
        ${j.doItems.length?`
        <div class="jitsu-section-ttl">✅ やるべきこと</div>
        <div class="jitsu-do-list">
          ${j.doItems.map((it,i)=>`
            <div class="jitsu-do-item">
              <div class="jitsu-do-num">${i+1}</div>
              <div class="jitsu-do-body"><strong>${it.title}</strong>${it.detail}</div>
            </div>`).join('')}
        </div>`:''}
        ${j.avoidItems.length?`
        <div class="jitsu-section-ttl">⚠️ 避けること</div>
        <div class="jitsu-avoid-list">
          ${j.avoidItems.map(a=>`<div class="jitsu-avoid-item">✕ ${a}</div>`).join('')}
        </div>`:''}
        ${j.note?`<div class="tsukasa-note" style="margin-bottom:8px">💡 ${j.note}</div>`:''}
        ${buildDatesSection(j)}
      </div>
    </div>`).join('');
}

function toggleJitsu(id){
  document.getElementById('jc-'+id).classList.toggle('open');
}

function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('active',b.getAttribute('onclick').includes(tab));
  });
  document.querySelectorAll('.tab-pane').forEach(p=>{
    p.classList.toggle('active',p.id==='tab-'+tab);
  });
  if(tab==='plan') renderPlanPage();
  if(tab==='jitsu') renderJitsuPage();
  if(tab==='guide') renderGuidePage();
}

function guideChMonth(d){
  guideMonth+=d;
  if(guideMonth>12){guideMonth=1;guideYear++;}
  if(guideMonth<1){guideMonth=12;guideYear--;}
  renderGuidePage();
}

// ---- 各カテゴリのスコア計算 ----
// 戻り値: {score: number, reasons: string[]}
// score: 正=良い, 負=悪い

function scoreHairCut(y,m,d){
  // 髪を切る
  let sc=0; const reasons=[];
  const phase=getMoonPhaseType(y,m,d);
  const roku=getRoku(y,m,d);
  const joku=getJoku(y,m,d);
  const niju=getNiju(y,m,d);
  const ds=String(m).padStart(2,'0')+String(d).padStart(2,'0');

  // 月齢（最重要）
  if(phase==='full'||phase==='waxing2'){sc+=4;reasons.push('満月〜上弦後（伸びが早くコシが出る）');}
  else if(phase==='waxing1'){sc+=3;reasons.push('新月→上弦（育ちが良い時期）');}
  else if(phase==='new'||phase==='waning2'){sc-=3;reasons.push('新月前後（エネルギーが根に向かう時期）');}
  else if(phase==='waning1'){sc+=1;reasons.push('満月→下弦（普通）');}

  // 六曜
  if(roku==='大安'){sc+=3;reasons.push('大安');}
  else if(roku==='友引'){sc+=2;reasons.push('友引');}
  else if(roku==='先勝'){sc+=1;reasons.push('先勝');}
  else if(roku==='仏滅'){sc-=2;reasons.push('仏滅');}

  // 十二直
  if(['開','成'].includes(joku)){sc+=2;reasons.push(`十二直：${joku}（変化を開く）`);}

// スコアをレベルに変換
function scToLevel(sc){
  if(sc>=7)  return 'best';
  if(sc>=4)  return 'good';
  if(sc>=2)  return 'ok';
  if(sc<=-6) return 'worst';
  if(sc<=-3) return 'bad';
  if(sc<=-1) return 'ng';
  return 'neutral';
}
function scToGoodBad(sc){
  if(sc>=2)  return 'good';
  if(sc<=-1) return 'bad';
  return 'none';
}

// ミニカレンダー1ヶ月分を生成（集中表示・大きめセル）
function buildMiniCal(cat, y, m){
  const days=new Date(y,m,0).getDate();
  const first=new Date(y,m-1,1).getDay();
  const today=new Date();
  const todayY=today.getFullYear(),todayM=today.getMonth()+1,todayD=today.getDate();

  // 全日スコアを計算
  const scores=[];
  for(let d=1;d<=days;d++) scores.push({d, ...cat.fn(y,m,d)});
  const maxSc=Math.max(...scores.map(s=>s.sc));
  const minSc=Math.min(...scores.map(s=>s.sc));

  // セルを生成
  let cells='';
  for(let i=0;i<first;i++) cells+=`<div class="gcell emp"></div>`;
  for(const {d,sc,reasons} of scores){
    const dow=new Date(y,m-1,d).getDay();
    const isToday=(y===todayY&&m===todayM&&d===todayD);
    const isBest=(sc===maxSc&&sc>=3);
    const isWorst=(sc===minSc&&sc<=-2);
    let lv=scToLevel(sc);
    if(isBest) lv='g-best';
    else if(sc>=4) lv='g-good';
    else if(sc>=2) lv='g-ok';
    else if(isWorst) lv='b-worst';
    else if(sc<=-3) lv='b-bad';
    else if(sc<=-1) lv='b-ng';
    else lv='neutral';

    const tip=`${y}/${m}/${d}　${reasons.join(' / ')||'特記なし'}`;
    const dowCls=dow===0?'sun-cell':dow===6?'sat-cell':'';
    const cls=['gcell',lv,isToday?'today-cell':'',dowCls].filter(Boolean).join(' ');

    // セル内：最良★ 最悪▲ それ以外は日付
    let inner=`<span>${isBest?'★':isWorst?'▲':d}</span>`;
    if(isBest||isWorst){
      inner=`<span style="font-size:.72rem;font-weight:900">${isBest?'★':'▲'}</span><span class="gcell-badge">${d}</span>`;
    }
    cells+=`<div class="${cls}" title="${tip}">${inner}</div>`;
  }

  return`
  <div class="gcal-wrap">
    <div class="gcal-wk"><div>日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div></div>
    <div class="gcal-days">${cells}</div>
    <div class="gcal-legend">
      <div class="gcal-legend-item"><div class="gcal-legend-dot" style="background:#1b5e20"></div>最良日★</div>
      <div class="gcal-legend-item"><div class="gcal-legend-dot" style="background:#388e3c"></div>良い</div>
      <div class="gcal-legend-item"><div class="gcal-legend-dot" style="background:#c8e6c9"></div>まあ良い</div>
      <div class="gcal-legend-item"><div class="gcal-legend-dot" style="background:#b71c1c"></div>最悪日▲</div>
      <div class="gcal-legend-item"><div class="gcal-legend-dot" style="background:#e53935"></div>避けたい</div>
      <div class="gcal-legend-item"><div class="gcal-legend-dot" style="background:#ffcdd2"></div>やや注意</div>
    </div>
  </div>`;
}

// 日付リストを生成（良い日・悪い日）
function buildDayList(cat, y, m){
  const days=new Date(y,m,0).getDate();
  const today=new Date();
  const todayY=today.getFullYear(),todayM=today.getMonth()+1,todayD=today.getDate();
  const WK=['日','月','火','水','木','金','土'];
  const MN=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

  const allScores=[];
  for(let d=1;d<=days;d++){
    const {sc,reasons}=cat.fn(y,m,d);
    const dow=new Date(y,m-1,d).getDay();
    allScores.push({d,sc,reasons,dow});
  }
  const maxSc=Math.max(...allScores.map(s=>s.sc));
  const minSc=Math.min(...allScores.map(s=>s.sc));

  const goodDays=allScores.filter(s=>s.sc>=2).sort((a,b)=>b.sc-a.sc);
  const badDays =allScores.filter(s=>s.sc<=-1).sort((a,b)=>a.sc-b.sc);

  function chip(s,type){
    const isBest=(s.sc===maxSc&&s.sc>=3);
    const isWorst=(s.sc===minSc&&s.sc<=-2);
    let cls=isBest?'best':isWorst?'worst':type==='good'?(s.sc>=4?'good':'ok'):(s.sc<=-3?'bad':'ng');
    const badge=isBest?' ★':isWorst?' ▲':'';
    const isToday=(y===todayY&&m===todayM&&s.d===todayD);
    const topR=s.reasons.slice(0,2).join(' / ');
    return`<span class="glist-chip ${cls}" title="${y}/${m}/${s.d}　${topR}">${m}/${s.d}（${WK[s.dow]}）${badge}${isToday?' ◀今日':''}</span>`;
  }

  return`
  <div class="glist-section">
    <div class="glist-section-ttl glist-ttl-good">✅ ${MN[m-1]}の良い日（${goodDays.length}日）</div>
    <div class="glist-chips">${goodDays.map(s=>chip(s,'good')).join('')||'<span style="font-size:.6rem;color:#8d6e4f;padding:2px 4px">今月は該当なし</span>'}</div>
  </div>
  <div class="glist-section">
    <div class="glist-section-ttl glist-ttl-bad">⚠️ ${MN[m-1]}の避けたい日（${badDays.length}日）</div>
    <div class="glist-chips">${badDays.map(s=>chip(s,'bad')).join('')||'<span style="font-size:.6rem;color:#8d6e4f;padding:2px 4px">今月は該当なし</span>'}</div>
  </div>`;
}

const PLAN_KEY='koyomi_plan_2026';

function loadPlanData(){
  try{return JSON.parse(localStorage.getItem(PLAN_KEY)||'{}');}catch{return{};}
}
function savePlanData(data){
  try{localStorage.setItem(PLAN_KEY,JSON.stringify(data));}catch{}
}

function getPlanDays(){
  const days=getStartupDaysCache();
  const WK=['日','月','火','水','木','金','土'];
  const today=new Date();
  today.setHours(0,0,0,0);
  const parse=str=>{const[m,d]=str.split('/').map(Number);return{m,d,str};};
  const enrich=({m,d,str})=>{
    const dt=new Date(2026,m-1,d);
    const wk=WK[dt.getDay()];
    const roku=getRoku(2026,m,d);
    const joku=getJoku(2026,m,d);
    const niju=getNiju(2026,m,d);
    const isHol=SP.holidays[String(m).padStart(2,'0')+String(d).padStart(2,'0')];
    const mercRetro=getRetrogradePlanets(2026,m,d).some(p=>p.id==='mercury');
    return{m,d,str,wk,roku,joku,niju,isHol,mercRetro,dt};
  };
  const exDays=days.ex.map(parse).map(enrich).map(o=>({...o,rank:'ex'}));
  const aDays =days.a.map(parse).map(enrich).map(o=>({...o,rank:'a'}));
  // 合算・日付順ソート・過去日を除外
  return[...exDays,...aDays]
    .sort((a,b)=>a.m*100+a.d-(b.m*100+b.d))
    .filter(d=>d.dt>=today);
}

function renderPlanPage(){
  const data=loadPlanData();
  document.getElementById('planTitleInput').value=data.title||'';
  document.getElementById('planTitleInput').oninput=()=>{
    const d=loadPlanData();d.title=document.getElementById('planTitleInput').value;savePlanData(d);
  };

  const planDays=getPlanDays();
  if(planDays.length===0){
    document.getElementById('planDateList').innerHTML='<div class="plan-empty">残りの事業開始吉日はありません</div>';
    document.getElementById('planProgressArea').style.display='none';
    return;
  }

  const entries=data.entries||{};
  const filled=planDays.filter(d=>{const e=entries[d.str];return e&&(e.plan||e.result);}).length;
  const pct=Math.round(filled/planDays.length*100);
  document.getElementById('planProgressArea').style.display='block';
  document.getElementById('planProgressPct').textContent=`${filled}/${planDays.length}日 記入済み（${pct}%）`;
  document.getElementById('planProgressFill').style.width=pct+'%';

  const exCount=planDays.filter(d=>d.rank==='ex').length;
  const aCount =planDays.filter(d=>d.rank==='a').length;

  document.getElementById('planDateList').innerHTML=`
    <div style="background:rgba(42,28,14,.85);border:1px solid rgba(201,168,76,.25);border-radius:10px;overflow:hidden;">
      <div style="padding:8px 12px;background:rgba(201,168,76,.08);border-bottom:1px solid rgba(201,168,76,.2);font-size:.65rem;color:rgba(232,201,122,.7);display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
        <span>🚀 事業開始吉日 全${planDays.length}日（今日以降・日付順）</span>
        <span style="display:inline-flex;align-items:center;gap:4px">
          <span style="background:linear-gradient(135deg,#ffe259,#ffa751);color:#7a4000;font-size:.55rem;padding:1px 6px;border-radius:3px;font-weight:700">✨最吉</span>
          <span style="color:rgba(232,201,122,.6);font-size:.6rem">${exCount}日</span>
        </span>
        <span style="display:inline-flex;align-items:center;gap:4px">
          <span style="background:#ffca28;color:#1a1008;font-size:.55rem;padding:1px 6px;border-radius:3px;font-weight:700">◎大吉</span>
          <span style="color:rgba(232,201,122,.6);font-size:.6rem">${aCount}日</span>
        </span>
      </div>
      <div class="plan-date-list">${planDays.map(d=>renderPlanRow(d,entries)).join('')}</div>
    </div>`;
}

function renderPlanRow(day,entries){
  const key=day.str;
  const e=(entries&&entries[key])||{plan:'',result:''};
  const hasPlan  =!!(e.plan&&e.plan.trim());
  const hasResult=!!(e.result&&e.result.trim());
  // プレビュー：実施内容優先、なければ活動計画を表示
  const previewSrc=hasResult?e.result:hasPlan?e.plan:'';
  const previewPrefix=hasResult?'✅ ':'📋 ';
  const preview=previewSrc
    ?(previewPrefix+previewSrc.replace(/\n/g,' ')).slice(0,32)+((previewPrefix+previewSrc).length>32?'…':'')
    :'';
  const mercWarn=day.mercRetro?'<span style="font-size:.5rem;color:#00b4d8;margin-left:4px">☿逆行</span>':'';
  const holStr=day.isHol?`<span style="font-size:.48rem;color:#c0392b;margin-left:3px">🎌</span>`:'';

  // 曜日色クラス（土=青、日=赤）
  const dow=day.dt.getDay();
  const wkCls=dow===6?'sat':dow===0?'sun':'';

  // ランクバッジ（アイコン・テキストを完全同一構造で揃える）
  const rankBadge=day.rank==='ex'
    ?`<div class="plan-rank-left prrl-ex"><span class="rl-icon">✨</span><span class="rl-text">最吉</span></div>`
    :`<div class="plan-rank-left prrl-a"><span class="rl-icon">◎</span><span class="rl-text">大吉</span></div>`;

  // 行の塗り分けクラス
  let rowCls='plan-row';
  if(day.rank==='ex') rowCls+=' plan-row-ex';
  if(hasResult) rowCls+=' has-result';
  else if(hasPlan) rowCls+=' has-plan';

  const doneMark=hasPlan||hasResult?'<span style="font-size:.6rem;color:#2d6a4f;margin-right:3px">✓</span>':'';

  return`<div class="${rowCls}" id="pr-${key}">
    <div class="plan-row-hdr" onclick="togglePlanRow('${key}')">
      ${rankBadge}
      <div class="plan-row-date">
        <span class="prd-main">${day.m}/${day.d}<span class="prd-wk ${wkCls}">（${day.wk}）</span></span>
        <div class="prd-sub">${day.roku}・${day.joku}${holStr}${mercWarn}</div>
      </div>
      <div class="plan-row-preview">${doneMark}${preview||'<span style="color:#bbb">未記入</span>'}</div>
      <div class="plan-row-toggle">▼</div>
    </div>
    <div class="plan-row-body" id="prb-${key}">
      <div class="plan-koyomi-tags">
        <span class="plan-koyomi-tag">六曜：${day.roku}</span>
        <span class="plan-koyomi-tag">十二直：${day.joku}</span>
        <span class="plan-koyomi-tag">二十八宿：${day.niju}</span>
        ${day.isHol?`<span class="plan-koyomi-tag" style="color:#c0392b">祝日：${day.isHol}</span>`:''}
        ${day.mercRetro?`<span class="plan-koyomi-tag" style="color:#00b4d8">☿水星逆行中</span>`:''}
      </div>
      ${hasPlan||hasResult ? `
        <!-- 登録済み：表示モード -->
        <div id="pview-${key}">
          <div class="plan-field-label">📋 活動計画・やること</div>
          <div class="plan-saved-text${hasPlan?'':' empty'}">${hasPlan?e.plan.replace(/\n/g,'<br>'):'未記入'}</div>
          <div class="plan-field-label" style="margin-top:8px">✅ 実施内容・結果・メモ</div>
          <div class="plan-saved-text${hasResult?'':' empty'}">${hasResult?e.result.replace(/\n/g,'<br>'):'未記入'}</div>
          <div style="display:flex;align-items:center;gap:8px;margin-top:8px">
            <button class="plan-edit-btn" onclick="enterEditMode('${key}')">✏️ 編集する</button>
          </div>
        </div>
        <!-- 編集モード（初期非表示） -->
        <div id="pedit-${key}" style="display:none">
          <div class="plan-field-label">📋 活動計画・やること</div>
          <textarea class="plan-textarea" id="plan-p-${key}" placeholder="この日に行う活動・タスク・目標を記入…" rows="3">${e.plan||''}</textarea>
          <div class="plan-field-label">✅ 実施内容・結果・メモ</div>
          <textarea class="plan-textarea" id="plan-r-${key}" placeholder="実施した内容・結果・気づきを記入…" rows="3">${e.result||''}</textarea>
          <div style="display:flex;align-items:center;gap:8px;margin-top:8px">
            <button class="plan-save-btn" onclick="savePlanRow('${key}')">保存して閉じる</button>
            <button class="plan-edit-btn" onclick="cancelEditMode('${key}')">キャンセル</button>
          </div>
        </div>
      ` : `
        <!-- 未登録：入力モード -->
        <div id="pedit-${key}">
          <div class="plan-field-label">📋 活動計画・やること</div>
          <textarea class="plan-textarea" id="plan-p-${key}" placeholder="この日に行う活動・タスク・目標を記入…" rows="3"></textarea>
          <div class="plan-field-label">✅ 実施内容・結果・メモ</div>
          <textarea class="plan-textarea" id="plan-r-${key}" placeholder="実施した内容・結果・気づきを記入…" rows="3"></textarea>
          <div style="display:flex;align-items:center;gap:8px;margin-top:8px">
            <button class="plan-save-btn" onclick="savePlanRow('${key}')">保存して閉じる</button>
          </div>
        </div>
      `}
    </div>
  </div>`;
}

function togglePlanRow(key){
  const row=document.getElementById('pr-'+key);
  row.classList.toggle('open');
}

function enterEditMode(key){
  document.getElementById('pview-'+key).style.display='none';
  const edit=document.getElementById('pedit-'+key);
  edit.style.display='block';
  // テキストエリアにフォーカス
  const ta=document.getElementById('plan-p-'+key);
  if(ta) setTimeout(()=>ta.focus(),50);
}

function cancelEditMode(key){
  document.getElementById('pedit-'+key).style.display='none';
  document.getElementById('pview-'+key).style.display='block';
}

function savePlanRow(key){
  const data=loadPlanData();
  if(!data.entries) data.entries={};
  data.entries[key]={
    plan:document.getElementById('plan-p-'+key).value,
    result:document.getElementById('plan-r-'+key).value,
    savedAt:new Date().toISOString()
  };
  savePlanData(data);
  // ページ再描画（保存内容を表示モードで反映）
  renderPlanPage();
  // 保存後は行を閉じる
  const row=document.getElementById('pr-'+key);
  if(row) row.classList.remove('open');
}


renderFilters();
renderLegend();
updateRetroPanel();
render();
</script>
</body>
